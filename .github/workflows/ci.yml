name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run backend tests
        working-directory: ./backend
        run: npm test
        env:
          JWT_SECRET: supersecretkey123

  test-frontend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ryanrohan
          POSTGRES_PASSWORD: password
          POSTGRES_DB: jobboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run database migrations
        working-directory: ./backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://ryanrohan:password@localhost:5432/jobboard

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Start backend
        working-directory: ./backend
        run: node dist/index.js &
        env:
          DATABASE_URL: postgresql://ryanrohan:password@localhost:5432/jobboard
          JWT_SECRET: supersecretkey123

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Start frontend
        working-directory: ./frontend
        run: npm start &

      - name: Wait for servers to be ready
        run: |
          npx wait-on http://localhost:4000 http://localhost:3000 --timeout 120000

      - name: Run Cypress tests
        working-directory: ./frontend
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: http://localhost:3000